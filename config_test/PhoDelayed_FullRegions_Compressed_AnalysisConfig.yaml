# Simple two-channel, four-bin analysis for had SVs and photons
# validation fit: CR -> CR 

analysis:
  name: "PhoDelayed_FullRegions_Compressed_AnalysisConfig"
  luminosity: 165.27
  output_json: "PhoDelayed_FullRegions_Compressed_AnalysisConfig.json"

samples:
  #backgrounds: []#"Wjets", "Zjets", "QCD", "Top", "Gjets", "Box"]
  signals: ["gogoGZ"] 
  data: ["MET16","MET17","MET18","MET23"]

baseline_cuts: &baseline_cuts
  - "(selCMet > 150)" 

################################ SV VETO Strings ##################
#exactly 1 hadronic SR SV
noSV: &noSV
  - "SV_nHadronic==0 || (SV_nHadronic == 1 && HadronicSV_dxySig[0] < 1000) || (SV_nHadronic == 2 && HadronicSV_dxySig[0] < 1000 && HadronicSV_dxySig[1] < 1000) || SV_nLeptonic==0 || (SV_nLeptonic == 1 && LeptonicSV_dxySig[0] < 1000) || (SV_nLeptonic == 2 && LeptonicSV_dxySig[0] < 1000 && LeptonicSV_dxySig[1] < 1000)"

noSVhad: &noSVhad
  - "SV_nHadronic==0 || (SV_nHadronic == 1 && HadronicSV_dxySig[0] < 1000) || (SV_nHadronic == 2 && HadronicSV_dxySig[0] < 1000 && HadronicSV_dxySig[1] < 1000)"

noSVlep: &noSVlep
  - "SV_nLeptonic==0 || (SV_nLeptonic == 1 && LeptonicSV_dxySig[0] < 1000) || (SV_nLeptonic == 2 && LeptonicSV_dxySig[0] < 1000 && LeptonicSV_dxySig[1] < 1000)"

################################################################
############################### Photon REGION Strings ##########################
Ch1CRgeq1PhoBHEarly: &Ch1CRgeq1PhoBHEarly
  - "(nBaseLinePhotons > 0)"
  # >= 1 BH photon early
  - "( (nBaseLinePhotons == 1 && baseLinePhoton_beamHaloCNNScore[0] >= 0.917252 && baseLinePhoton_WTimeSig[0] < -2.5) || ( nBaseLinePhotons == 2 && ((baseLinePhoton_beamHaloCNNScore[0] >= 0.917252 && baseLinePhoton_WTimeSig[0] < -2.5) || (baseLinePhoton_beamHaloCNNScore[1] >= 0.917252 && baseLinePhoton_WTimeSig[1] < -2.5)) ) )"

Ch1CReq1PhoBHEarly: &Ch1CReq1PhoBHEarly
  - "(nBaseLinePhotons == 1)"
  # == 1 BH photon early
  - "(baseLinePhoton_beamHaloCNNScore[0] >= 0.917252 && baseLinePhoton_WTimeSig[0] < -2.5)"

Ch1CReq2PhoBHEarly: &Ch1CReq2PhoBHEarly
  - "(nBaseLinePhotons == 2)"
  # == 2 BH photon early
  - "( ((baseLinePhoton_beamHaloCNNScore[0] >= 0.917252 && baseLinePhoton_WTimeSig[0] < -2.5) || (baseLinePhoton_beamHaloCNNScore[1] >= 0.917252 && baseLinePhoton_WTimeSig[1] < -2.5)) )"


Ch2CRgeq1PhoBHLate: &Ch2CRgeq1PhoBHLate
  - "(nBaseLinePhotons > 0)"
  # >= 1 BH photon late
  - "(nBaseLinePhotons == 1 && baseLinePhoton_beamHaloCNNScore[0] >= 0.917252 && baseLinePhoton_WTimeSig[0] >= 2.5) || ( nBaseLinePhotons == 2 && ((baseLinePhoton_beamHaloCNNScore[0] >= 0.917252 && baseLinePhoton_WTimeSig[0] >= 2.5) || (baseLinePhoton_beamHaloCNNScore[1] >= 0.917252 && baseLinePhoton_WTimeSig[1] >= 2.5)) )"

Ch2CReq1PhoBHLate: &Ch2CReq1PhoBHLate
  - "(nBaseLinePhotons == 1)"
  # == 1 BH photon late
  - "(nBaseLinePhotons == 1 && baseLinePhoton_beamHaloCNNScore[0] >= 0.917252 && baseLinePhoton_WTimeSig[0] >= 2.5)"

Ch2CReq2PhoBHLate: &Ch2CReq2PhoBHLate
  - "(nBaseLinePhotons == 2)"
  # == 2 BH photon late
  - "( ((baseLinePhoton_beamHaloCNNScore[0] >= 0.917252 && baseLinePhoton_WTimeSig[0] >= 2.5) || (baseLinePhoton_beamHaloCNNScore[1] >= 0.917252 && baseLinePhoton_WTimeSig[1] >= 2.5)) )"


# ==0 BH photons
# >= 1 notBH photons
# >= 1 nonprompt
Ch3CRgeq1PhoNotBHEarly: &Ch3CRgeq1PhoNotBHEarly
  - "(nBaseLinePhotons > 0)"
  # == 0 BH photons
  - "(( (nBaseLinePhotons == 1 && baseLinePhoton_beamHaloCNNScore[0] < 0.917252) || (nBaseLinePhotons == 2 && baseLinePhoton_beamHaloCNNScore[0] < 0.917252 && baseLinePhoton_beamHaloCNNScore[1] < 0.917252) ) )"
  # >=1 notBH photons early
  - "( (nBaseLinePhotons == 1 && baseLinePhoton_beamHaloCNNScore[0] < 0.185 && baseLinePhoton_WTimeSig[0] < -2.5) || ( nBaseLinePhotons == 2 && ((baseLinePhoton_beamHaloCNNScore[0] < 0.185 && baseLinePhoton_WTimeSig[0] < -2.5) || (baseLinePhoton_beamHaloCNNScore[1] < 0.185 && baseLinePhoton_WTimeSig[1] < -2.5)) ) )"

Ch3CReq1PhoNotBHEarly: &Ch3CReq1PhoNotBHEarly
  - "(nBaseLinePhotons > 0)"
  # == 0 BH photons
  - "(( (nBaseLinePhotons == 1 && baseLinePhoton_beamHaloCNNScore[0] < 0.917252) || (nBaseLinePhotons == 2 && baseLinePhoton_beamHaloCNNScore[0] < 0.917252 && baseLinePhoton_beamHaloCNNScore[1] < 0.917252) ) )"
  # == 1 notBH photons early (lead photon is tagged notBH early OR (if ==2 bl photons and lead is !notBH) sublead is tagged notBH early 
  - "( (baseLinePhoton_beamHaloCNNScore[0] < 0.185 && baseLinePhoton_WTimeSig[0] < -2.5) || ( nBaseLinePhotons == 2 && ( baseLinePhoton_beamHaloCNNScore[0] >= 0.185) && (baseLinePhoton_beamHaloCNNScore[1] < 0.185 && baseLinePhoton_WTimeSig[1] < -2.5)) )"

Ch3CReq2PhoNotBHEarly: &Ch3CReq2PhoNotBHEarly
  - "(nBaseLinePhotons > 0)"
  # == 0 BH photons
  - "(( (nBaseLinePhotons == 1 && baseLinePhoton_beamHaloCNNScore[0] < 0.917252) || (nBaseLinePhotons == 2 && baseLinePhoton_beamHaloCNNScore[0] < 0.917252 && baseLinePhoton_beamHaloCNNScore[1] < 0.917252) ) )"
  # == 2 notBH photons early
  - "( nBaseLinePhotons == 2 && ((baseLinePhoton_beamHaloCNNScore[0] < 0.185 && baseLinePhoton_WTimeSig[0] < -2.5) || (baseLinePhoton_beamHaloCNNScore[1] < 0.185 && baseLinePhoton_WTimeSig[1] < -2.5)) )"


Ch4SRgeq1PhoNotBHLate: &Ch4SRgeq1PhoNotBHLate
  - "(nBaseLinePhotons > 0)"
  # == 0 BH photons
  - "(( (nBaseLinePhotons == 1 && baseLinePhoton_beamHaloCNNScore[0] < 0.917252) || (nBaseLinePhotons == 2 && baseLinePhoton_beamHaloCNNScore[0] < 0.917252 && baseLinePhoton_beamHaloCNNScore[1] < 0.917252) ) )"
  # >=1 notBH photons late
  - "( (nBaseLinePhotons == 1 && baseLinePhoton_beamHaloCNNScore[0] < 0.185 && baseLinePhoton_WTimeSig[0] >= 2.5) || ( nBaseLinePhotons == 2 && ((baseLinePhoton_beamHaloCNNScore[0] < 0.185 && baseLinePhoton_WTimeSig[0] >= 2.5) || (baseLinePhoton_beamHaloCNNScore[1] < 0.185 && baseLinePhoton_WTimeSig[1] >= 2.5)) ) )"

Ch4SReq1PhoNotBHLate: &Ch4SReq1PhoNotBHLate
  - "(nBaseLinePhotons > 0)"
  # == 0 BH photons
  - "(( (nBaseLinePhotons == 1 && baseLinePhoton_beamHaloCNNScore[0] < 0.917252) || (nBaseLinePhotons == 2 && baseLinePhoton_beamHaloCNNScore[0] < 0.917252 && baseLinePhoton_beamHaloCNNScore[1] < 0.917252) ) )"
  # == 1 notBH photons late (lead photon is tagged notBH late OR (if ==2 bl photons and lead is !notBH) sublead is tagged notBH late 
  - "( (baseLinePhoton_beamHaloCNNScore[0] < 0.185 && baseLinePhoton_WTimeSig[0] >= 2.5) || ( nBaseLinePhotons == 2 && ( baseLinePhoton_beamHaloCNNScore[0] >= 0.185) && (baseLinePhoton_beamHaloCNNScore[1] < 0.185 && baseLinePhoton_WTimeSig[1] >= 2.5)) )"

Ch4SReq2PhoNotBHLate: &Ch4SReq2PhoNotBHLate
  - "(nBaseLinePhotons > 0)"
  # == 0 BH photons
  - "(( (nBaseLinePhotons == 1 && baseLinePhoton_beamHaloCNNScore[0] < 0.917252) || (nBaseLinePhotons == 2 && baseLinePhoton_beamHaloCNNScore[0] < 0.917252 && baseLinePhoton_beamHaloCNNScore[1] < 0.917252) ) )"
  # == 2 notBH photons late
  - "( nBaseLinePhotons == 2 && ((baseLinePhoton_beamHaloCNNScore[0] < 0.185 && baseLinePhoton_WTimeSig[0] >= 2.5) || (baseLinePhoton_beamHaloCNNScore[1] < 0.185 && baseLinePhoton_WTimeSig[1] >= 2.5)) )"


# == 0 BH photons
# == 0 nonprompt photons
# == 0 tight iso photons
Ch5CRgeq1PhoMedIsoPrompt: &Ch5CRgeq1PhoMedIsoPrompt
  - "(nBaseLinePhotons > 0)"
  # == 0 BH photons
  - "(( (nBaseLinePhotons == 1 && baseLinePhoton_beamHaloCNNScore[0] < 0.917252) || (nBaseLinePhotons == 2 && baseLinePhoton_beamHaloCNNScore[0] < 0.917252 && baseLinePhoton_beamHaloCNNScore[1] < 0.917252) ) )"
  # == 0 nonprompt photons
  - "( (nBaseLinePhotons == 1 && (baseLinePhoton_WTimeSig[0] < 2.5 && baseLinePhoton_WTimeSig[0] > -2.5)) || (nBaseLinePhotons == 2 && ( baseLinePhoton_WTimeSig[0] < 2.5 && baseLinePhoton_WTimeSig[0] > -2.5) && ( baseLinePhoton_WTimeSig[1] < 2.5 && baseLinePhoton_WTimeSig[1] > -2.5)) )"
  # == 0 tight iso photons (same as >= 1 med (loose-not-tight) for same WP) 
  #- "( (nBaseLinePhotons == 1 && (baseLinePhoton_isoANNScore[0] < 0.9)) || (nBaseLinePhotons == 2 && ( baseLinePhoton_isoANNScore[0] < 0.9) && ( baseLinePhoton_isoANNScore[1] < 0.9)) )"
  #- "( (nBaseLinePhotons == 1 && ((baseLinePhoton_Pt[0] > 70 && baseLinePhoton_isoANNScore[0] < 0.8 && (baseLinePhoton_Eta[0] < 1.479 && baseLinePhoton_Eta[0] > -1.479 )))) ||(nBaseLinePhotons == 2 && ((baseLinePhoton_Eta[0] < 1.479 && baseLinePhoton_Eta[0] > -1.479 ) && (baseLinePhoton_Eta[1] < 1.479 && baseLinePhoton_Eta[1] > -1.479 )) && ( baseLinePhoton_isoANNScore[0] < 0.8 || baseLinePhoton_isoANNScore[1] < 0.9 ) ) )"
  - "(nBaseLinePhotons == 1 && ((baseLinePhoton_Pt[0] > 100 && (baseLinePhoton_Eta[0] < 1.479 && baseLinePhoton_Eta[0] > -1.479 )) && baseLinePhoton_isoANNScore[0] < 0.6 ) || (nBaseLinePhotons == 2 && (baseLinePhoton_Eta[0] < 1.479 && baseLinePhoton_Eta[0] > -1.479 ) && (baseLinePhoton_Eta[1] < 1.479 && baseLinePhoton_Eta[1] > -1.479 ) && !(baseLinePhoton_isoANNScore[0] > 0.6 && baseLinePhoton_isoANNScore[1] > 0.7) && baseLinePhoton_Pt[0] > 100 && baseLinePhoton_Pt[1] > 70) )"
    
Ch5CReq1PhoMedIsoPrompt: &Ch5CReq1PhoMedIsoPrompt
  - "(nBaseLinePhotons > 0)"
  # == 0 BH photons
  - "(( (nBaseLinePhotons == 1 && baseLinePhoton_beamHaloCNNScore[0] < 0.917252) || (nBaseLinePhotons == 2 && baseLinePhoton_beamHaloCNNScore[0] < 0.917252 && baseLinePhoton_beamHaloCNNScore[1] < 0.917252) ) )"
  # == 0 nonprompt photons
  - "( (nBaseLinePhotons == 1 && (baseLinePhoton_WTimeSig[0] < 2.5 && baseLinePhoton_WTimeSig[0] > -2.5)) || (nBaseLinePhotons == 2 && ( baseLinePhoton_WTimeSig[0] < 2.5 && baseLinePhoton_WTimeSig[0] > -2.5) && ( baseLinePhoton_WTimeSig[1] < 2.5 && baseLinePhoton_WTimeSig[1] > -2.5)) )"
  # == 0 tight iso photons (same as >= 1 med (loose-not-tight) for same WP) 
  #- "( (nBaseLinePhotons == 1 && (baseLinePhoton_isoANNScore[0] < 0.9)))"
  - "(nBaseLinePhotons == 1 && ((baseLinePhoton_Pt[0] > 100 && (baseLinePhoton_Eta[0] < 1.479 && baseLinePhoton_Eta[0] > -1.479 )) && baseLinePhoton_isoANNScore[0] < 0.6 ) || (nBaseLinePhotons == 2 && (baseLinePhoton_Eta[0] < 1.479 && baseLinePhoton_Eta[0] > -1.479 ) && (baseLinePhoton_Eta[1] < 1.479 && baseLinePhoton_Eta[1] > -1.479 ) && ((baseLinePhoton_isoANNScore[0] > 0.6 && baseLinePhoton_isoANNScore[1] < 0.7) || (baseLinePhoton_isoANNScore[0] < 0.6 && baseLinePhoton_isoANNScore[1] > 0.7)) && (baseLinePhoton_Pt[0] > 100 && baseLinePhoton_Pt[1] > 70) ) )"

Ch5CReq2PhoMedIsoPrompt: &Ch5CReq2PhoMedIsoPrompt
  - "(nBaseLinePhotons > 0)"
  # == 0 BH photons
  - "(( (nBaseLinePhotons == 1 && baseLinePhoton_beamHaloCNNScore[0] < 0.917252) || (nBaseLinePhotons == 2 && baseLinePhoton_beamHaloCNNScore[0] < 0.917252 && baseLinePhoton_beamHaloCNNScore[1] < 0.917252) ) )"
  # == 0 nonprompt photons
  - "( (nBaseLinePhotons == 1 && (baseLinePhoton_WTimeSig[0] < 2.5 && baseLinePhoton_WTimeSig[0] > -2.5)) || (nBaseLinePhotons == 2 && ( baseLinePhoton_WTimeSig[0] < 2.5 && baseLinePhoton_WTimeSig[0] > -2.5) && ( baseLinePhoton_WTimeSig[1] < 2.5 && baseLinePhoton_WTimeSig[1] > -2.5)) )"
  # == 0 tight iso photons (same as >= 1 med (loose-not-tight) for same WP) 
  - "( (nBaseLinePhotons == 2 && ((baseLinePhoton_Pt[0] > 100 && (baseLinePhoton_Eta[0] < 1.479 && baseLinePhoton_Eta[0] > -1.479 ) && baseLinePhoton_isoANNScore[0] < 0.6)  && (baseLinePhoton_Pt[1] > 70 && (baseLinePhoton_Eta[1] < 1.479 && baseLinePhoton_Eta[1] > -1.479 ) && baseLinePhoton_isoANNScore[1] < 0.7) )))"

# == 0 BH photons
# == 0 nonprompt photons
# >= 1 tight iso photons
Ch6SRgeq1PhoTightIsoPrompt: &Ch6SRgeq1PhoTightIsoPrompt
  - "(nBaseLinePhotons > 0)"
  # == 0 BH photons
  - "(( (nBaseLinePhotons == 1 && baseLinePhoton_beamHaloCNNScore[0] < 0.917252) || (nBaseLinePhotons == 2 && baseLinePhoton_beamHaloCNNScore[0] < 0.917252 && baseLinePhoton_beamHaloCNNScore[1] < 0.917252) ) )"
  # == 0 nonprompt photons
  - "( (nBaseLinePhotons == 1 && (baseLinePhoton_WTimeSig[0] < 2.5 && baseLinePhoton_WTimeSig[0] > -2.5)) || (nBaseLinePhotons == 2 && ( baseLinePhoton_WTimeSig[0] < 2.5 && baseLinePhoton_WTimeSig[0] > -2.5) && ( baseLinePhoton_WTimeSig[1] < 2.5 && baseLinePhoton_WTimeSig[1] > -2.5)) )"
  # == 1 || == 2 tight iso photons 
  #- "( (nBaseLinePhotons == 1 && (baseLinePhoton_isoANNScore[0] >= 0.9)) || (nBaseLinePhotons == 2 && ( baseLinePhoton_isoANNScore[0] >= 0.9) || ( baseLinePhoton_isoANNScore[1] >= 0.9)) )"
  - "( (nBaseLinePhotons == 1 && ( baseLinePhoton_Pt[0] > 100 && baseLinePhoton_isoANNScore[0] > 0.6 &&  (baseLinePhoton_Eta[0] < 1.479 && baseLinePhoton_Eta[0] > -1.479) ))  || ( (nBaseLinePhotons == 2 && ( baseLinePhoton_isoANNScore[0] > 0.6 && baseLinePhoton_Pt[0] > 100 && (baseLinePhoton_Eta[0] < 1.479 && baseLinePhoton_Eta[0] > -1.479)  ) && (baseLinePhoton_Pt[1] > 70 && baseLinePhoton_isoANNScore[1] > 0.7 && (baseLinePhoton_Eta[1] < 1.479 && baseLinePhoton_Eta[1] > -1.479 )  ))  ) )"

# == 0 BH photons
# == 0 nonprompt photons OR (>=1 notBH && == 0 BH && notBHlead prompt) 
# == 1 tight iso photons
Ch6SReq1PhoTightIsoPrompt: &Ch6SReq1PhoTightIsoPrompt
  - "(nBaseLinePhotons > 0)"
  # == 0 BH photons
  - "(( (nBaseLinePhotons == 1 && baseLinePhoton_beamHaloCNNScore[0] < 0.917252) || (nBaseLinePhotons == 2 && baseLinePhoton_beamHaloCNNScore[0] < 0.917252 && baseLinePhoton_beamHaloCNNScore[1] < 0.917252) ))"
  # == 0 nonprompt photons OR (>=1 notBH && == 0 BH && notBHlead prompt)
  - "( (nBaseLinePhotons == 1 && (baseLinePhoton_WTimeSig[0] < 2.5 && baseLinePhoton_WTimeSig[0] > -2.5)) || (nBaseLinePhotons == 2 && ( baseLinePhoton_WTimeSig[0] < 2.5 && baseLinePhoton_WTimeSig[0] > -2.5) && ( baseLinePhoton_WTimeSig[1] < 2.5 && baseLinePhoton_WTimeSig[1] > -2.5)) )"
  #- "( (nBaseLinePhotons == 1 && (baseLinePhoton_WTimeSig[0] < 2.5 && baseLinePhoton_WTimeSig[0] > -2.5)) || (nBaseLinePhotons == 2 && ( baseLinePhoton_WTimeSig[0] < 2.5 && baseLinePhoton_WTimeSig[0] > -2.5) && ( baseLinePhoton_WTimeSig[1] < 2.5 && baseLinePhoton_WTimeSig[1] > -2.5))  || ((nBaseLinePhotons == 1 &&  baseLinePhoton_beamHaloCNNScore[0] < 0.917252 && (baseLinePhoton_WTimeSig[0] < 2.5 && baseLinePhoton_WTimeSig[0] >= -2.5 )) || ( nBaseLinePhotons == 2 && baseLinePhoton_beamHaloCNNScore[0] < 0.917252 && baseLinePhoton_beamHaloCNNScore[1] < 0.917252 && ( (baseLinePhoton_beamHaloCNNScore[0] < 0.185 && (baseLinePhoton_WTimeSig[0] < 2.5 && baseLinePhoton_WTimeSig[0] >= -2.5 ) ) || (baseLinePhoton_beamHaloCNNScore[1] < 0.185 && (baseLinePhoton_WTimeSig[1] < 2.5 && baseLinePhoton_WTimeSig[1] >= -2.5)))) ) )"
  # == 1 tight iso photons 
  #- "( (nBaseLinePhotons == 1 && (baseLinePhoton_isoANNScore[0] >= 0.9)) || (nBaseLinePhotons == 2 && ( baseLinePhoton_isoANNScore[0] >= 0.9 && baseLinePhoton_isoANNScore[1] < 0.9) || ( baseLinePhoton_isoANNScore[1] >= 0.9 && baseLinePhoton_isoANNScore[0] < 0.9 )) )"
  - "(nBaseLinePhotons == 1 && ( baseLinePhoton_Pt[0] > 100 && baseLinePhoton_isoANNScore[0] >= 0.6 && (baseLinePhoton_Eta[0] < 1.479 && baseLinePhoton_Eta[0] > -1.479) ))"

Ch6SReq2PhoTightIsoPrompt: &Ch6SReq2PhoTightIsoPrompt
  - "(nBaseLinePhotons > 0)"
  # == 0 BH photons
  - "(( (nBaseLinePhotons == 1 && baseLinePhoton_beamHaloCNNScore[0] < 0.917252) || (nBaseLinePhotons == 2 && baseLinePhoton_beamHaloCNNScore[0] < 0.917252 && baseLinePhoton_beamHaloCNNScore[1] < 0.917252) ) )"
  # == 0 nonprompt photons
  - "( (nBaseLinePhotons == 1 && (baseLinePhoton_WTimeSig[0] < 2.5 && baseLinePhoton_WTimeSig[0] > -2.5)) || (nBaseLinePhotons == 2 && ( baseLinePhoton_WTimeSig[0] < 2.5 && baseLinePhoton_WTimeSig[0] > -2.5) && ( baseLinePhoton_WTimeSig[1] < 2.5 && baseLinePhoton_WTimeSig[1] > -2.5)) )"
  # == 0 nonprompt photons OR (>=1 notBH && == 0 BH && notBHlead prompt)
  #- "( (nBaseLinePhotons == 1 && (baseLinePhoton_WTimeSig[0] < 2.5 && baseLinePhoton_WTimeSig[0] > -2.5)) || (nBaseLinePhotons == 2 && ( baseLinePhoton_WTimeSig[0] < 2.5 && baseLinePhoton_WTimeSig[0] > -2.5) && ( baseLinePhoton_WTimeSig[1] < 2.5 && baseLinePhoton_WTimeSig[1] > -2.5))  || ((nBaseLinePhotons == 1 &&  baseLinePhoton_beamHaloCNNScore[0] < 0.917252 && (baseLinePhoton_WTimeSig[0] < 2.5 && baseLinePhoton_WTimeSig[0] >= -2.5 )) || ( nBaseLinePhotons == 2 && baseLinePhoton_beamHaloCNNScore[0] < 0.917252 && baseLinePhoton_beamHaloCNNScore[1] < 0.917252 && ( (baseLinePhoton_beamHaloCNNScore[0] < 0.185 && (baseLinePhoton_WTimeSig[0] < 2.5 && baseLinePhoton_WTimeSig[0] >= -2.5 ) ) || (baseLinePhoton_beamHaloCNNScore[1] < 0.185 && (baseLinePhoton_WTimeSig[1] < 2.5 && baseLinePhoton_WTimeSig[1] >= -2.5))))) )"
  # == 2 tight iso photons 
  #- "( (nBaseLinePhotons == 2 && ( baseLinePhoton_isoANNScore[0] >= 0.9) && ( baseLinePhoton_isoANNScore[1] >= 0.9)) )"
  # == 2 tight iso barrel photons 
  - "( (nBaseLinePhotons == 2 && ( baseLinePhoton_Pt[0] > 100 && baseLinePhoton_isoANNScore[0] >= 0.6 && (baseLinePhoton_Eta[0] < 1.479 && baseLinePhoton_Eta[0] > -1.479)  ) && (baseLinePhoton_Pt[1] > 70 && baseLinePhoton_isoANNScore[1] >= 0.7 && (baseLinePhoton_Eta[1] < 1.479 && baseLinePhoton_Eta[1] > -1.479 )  )) )"
##########################################################
Cleaning: &Cleaning
  - "(Flag_MetFilters == 1) && ( rjrPTS[0] < 150) && ( (Trigger_PFMET120_PFMHT120_IDTight == 1)||(Trigger_PFMET120_PFMHT120_IDTight_PFHT60 == 1)||(Trigger_PFMETNoMu120_PFMHTNoMu120_IDTight)||(Trigger_PFMETNoMu120_PFMHTNoMu120_IDTight_PFHT60))"
    
kin: &kin
  #- "rjrIsr_nSVisObjects > 1 && rjrIsr_PtIsr > 500"
  - "((rjrIsr_nSVisObjects > 1) && (rjrIsr_PtIsr > 800))"

DelayedBin00: &DelayedBin00
  - "(rjrIsr_RIsr >= 0.8)"

bins:
  Ch1CRgeq1PhoBHEarlyBin00:
    cuts:
      - *baseline_cuts
      - *Cleaning
      - *noSV
      - *kin
      - *Ch1CRgeq1PhoBHEarly
      - *DelayedBin00
        #Ch1CRgeq1PhoBHEarlyBin10:
        #  cuts:
        #    - *baseline_cuts
        #    - *Cleaning
        #    - *noSV
        #    - *Ch1CRgeq1PhoBHEarly
        #    - *DelayedBin10
  Ch2CRgeq1PhoBHLateBin00:
    cuts:
      - *baseline_cuts
      - *Cleaning
      - *noSV
      - *kin
      - *Ch2CRgeq1PhoBHLate
      - *DelayedBin00
        #Ch2CRgeq1PhoBHLateBin10:
        #  cuts:
        #    - *baseline_cuts
        #    - *Cleaning
        #    - *noSV
        #    - *Ch2CRgeq1PhoBHLate
        #    - *DelayedBin10
  Ch3CRgeq1PhoNotBHEarlyBin00:
    cuts:
      - *baseline_cuts
      - *Cleaning
      - *noSV
      - *kin
      - *Ch3CRgeq1PhoNotBHEarly
      - *DelayedBin00
        #Ch3CRgeq1PhoNotBHEarlyBin10:
        #  cuts:
        #    - *baseline_cuts
        #    - *Cleaning
        #    - *noSV
        #    - *Ch3CRgeq1PhoNotBHEarly
        #    - *DelayedBin10
  Ch4SRgeq1PhoNotBHLateBin00:
    cuts:
      - *baseline_cuts
      - *Cleaning
      - *noSV
      - *kin
      - *Ch4SRgeq1PhoNotBHLate
      - *DelayedBin00
        #Ch4SRgeq1PhoNotBHLateBin10:
        #  cuts:
        #    - *baseline_cuts
        #    - *Cleaning
        #    - *noSV
        #    - *Ch4SRgeq1PhoNotBHLate
        #    - *DelayedBin10
