      - *kin
      - *DelayedBin10

  Ch6SRPhoLateNotBH00:
    cuts:
      - *baseline_cuts
      - *nPhoge1
      - *phoLateNotBH
      - *Cleaning
      - *kin
      - *DelayedBin00
  Ch6SRPhoLateNotBH10:
    cuts:
      - *baseline_cuts
      - *nPhoge1
      - *phoLateNotBH
      - *Cleaning
      - *kin
      - *DelayedBin10


  Ch7CRSVHadLowDxy00:
