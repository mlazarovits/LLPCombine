# Simple two-channel, four-bin analysis for had SVs and photons
# validation fit: CR -> CR 

analysis:
  name: "PhoSV_FullRegions_noMix_NonCompressed_v49_MConly"
  luminosity: 400.0
  output_json: "PhoSV_FullRegions_noMix_NonCompressed_v49.json"

samples:
  #backgrounds: []#"Wjets", "Zjets", "QCD", "Top", "Gjets", "Box"]
  signals: ["gogoGZ"] 
#  data: ["MET23"]

baseline_cuts: &baseline_cuts
  - "(selCMet > 150)" 

nHad1: &nHad1
  - "(SV_nHadronic == 1)  && (nblTightIsoPhotons == 0 )"

#dxy sideband
CRLowdxyHad: &CRLowdxyHad
  - "(HadronicSV_dxySig[0] < 1000)"
  
#dxy signal region
SRHighdxyHad: &SRHighdxyHad
  - "(HadronicSV_dxySig[0] >= 1000)"

#to make orthogonal to SV regions (as much as possible for now...)
nPhoge1: &nPhoge1
  - "(SV_nHadronic == 0) && (nBaseLinePhotons > 0)"

#exclusive with bh (require ==0 bh photons) and early/delayed CR/SRs bc lead ID'd photon is prompt
#non iso sideband (med = loose not tight)
#nbltightisophotons == 0  (could overlap with SV regions - SRs and CRs)
phoMedIso: &phoMedIso
  - "passNPhoGe1SelectionPromptLooseNotTightIsoCR == 1" 

#tight iso - prompt photon SR
#> 0 tight iso photons
phoTightIso: &phoTightIso
  - "passNPhoGe1SelectionPromptTightIsoSR == 1" 

#delayed sideband - beam halo
#> 0 bh photons
phoEarlyBH: &phoEarlyBH
  - "passNPhoGe1SelectionEarlyBeamHaloCR == 1"
phoLateBH: &phoLateBH
  - "passNPhoGe1SelectionLateBeamHaloCR == 1"

#early CR - not beam halo
phoEarlyNotBH: &phoEarlyNotBH
  - "passNPhoGe1SelectionEarlyNotBHCR == 1"

#delayed SR - not beam halo
phoLateNotBH: &phoLateNotBH
  - "passNPhoGe1SelectionLateNotBHSR == 1"


Cleaning: &Cleaning
  - "(Flag_MetFilters == 1) && ( rjrPTS[0] < 150) && ( (Trigger_PFMET120_PFMHT120_IDTight == 1)||(Trigger_PFMET120_PFMHT120_IDTight_PFHT60 == 1)||(Trigger_PFMETNoMu120_PFMHTNoMu120_IDTight)||(Trigger_PFMETNoMu120_PFMHTNoMu120_IDTight_PFHT60))"
    
kin: &kin
  - "(rjr_Ms[0] >= 1000) && (rjr_Rs[0] >= 0.15)"

b00: &b00
  - "(rjr_Ms[0] >= 1000) && (rjr_Ms[0] < 1500) && (rjr_Rs[0] < 0.2)"
b10: &b10
  - "(rjr_Ms[0] >= 1500) && (rjr_Rs[0] < 0.2)"
b01: &b01
  - "(rjr_Ms[0] >= 1000) && (rjr_Ms[0] < 1500) && (rjr_Rs[0] >= 0.2)"
b11: &b11
  - "(rjr_Ms[0] >= 1500) && (rjr_Rs[0] >= 0.2)"

DelayedBin00: &DelayedBin00
  - "(rjr_Ms[0] >= 700) && (rjr_Ms[0] < 1000)"
  - "(rjr_Rs[0] >= 0.15)"
DelayedBin10: &DelayedBin10
  - "(rjr_Ms[0] >= 1000)"
  - "(rjr_Rs[0] >= 0.15)"

bins:
  Ch1CRPhoPromptMedIso00:
    cuts:
      - *baseline_cuts
      - *Cleaning
      - *nPhoge1
      - *phoMedIso
      - *kin
      - *b00
  Ch1CRPhoPromptMedIso10:
      - *baseline_cuts
      - *Cleaning
      - *nPhoge1
      - *phoMedIso
      - *kin
      - *b10
  Ch1CRPhoPromptMedIso01:
      - *baseline_cuts
      - *nPhoge1
      - *phoMedIso
      - *Cleaning
      - *kin
      - *b01
  Ch1CRPhoPromptMedIso11:
      - *baseline_cuts
      - *nPhoge1
      - *phoMedIso
      - *Cleaning
      - *kin
      - *b11

  Ch2CRPhoPromptTightIso00:
    cuts:
      - *baseline_cuts
      - *nPhoge1
      - *phoTightIso
      - *Cleaning
      - *kin
      - *b00
  Ch2SRPhoPromptTightIso10:
      - *baseline_cuts
      - *nPhoge1
      - *phoTightIso
      - *Cleaning
      - *kin
      - *b10
  Ch2SRPhoPromptTightIso01:
      - *baseline_cuts
      - *nPhoge1
      - *phoTightIso
      - *Cleaning
      - *kin
      - *b01
  Ch2SRPhoPromptTightIso11:
      - *baseline_cuts
      - *nPhoge1
      - *phoTightIso
      - *Cleaning
      - *kin
      - *b11

  Ch3CRPhoEarlyBH00:
    cuts:
      - *baseline_cuts
      - *nPhoge1
      - *phoEarlyBH
      - *Cleaning
      - *kin
      - *DelayedBin00
  Ch3CRPhoEarlyBH10:
