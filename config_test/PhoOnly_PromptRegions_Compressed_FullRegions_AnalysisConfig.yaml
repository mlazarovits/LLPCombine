# Simple two-channel, four-bin analysis for had SVs and photons
# validation fit: CR -> CR 

analysis:
  name: "PhoOnly_PromptRegions_Compressed_AnalysisConfig"
  luminosity: 165.27
  output_json: "PhoOnly_PromptRegions_Compressed_AnalysisConfig.json"

samples:
  #backgrounds: []#"Wjets", "Zjets", "QCD", "Top", "Gjets", "Box"]
  signals: ["gogoGZ"] 
  data: ["MET16","MET17","MET18","MET23"]

baseline_cuts: &baseline_cuts
  - "(selCMet > 150)" 

################################ SV Strings ##################
noSVhad2: &noSVhad2
  - "SV_nHadronic==0 || (SV_nHadronic == 2 && HadronicSV_dxySig[0] < 1000 && HadronicSV_dxySig[1] < 1000)"

noSVlep1: &noSVlep1
  - "SV_nLeptonic==0 || (SV_nLeptonic == 1 && LeptonicSV_dxySig[0] < 1000)"
noSVlep2: &noSVlep2
  - "SV_nLeptonic==0 || (SV_nLeptonic == 2 && LeptonicSV_dxySig[0] < 1000 && LeptonicSV_dxySig[1] < 1000)"

noSV: &noSV
  - "(SV_nHadronic==0 || (SV_nHadronic == 1 && HadronicSV_dxySig[0] < 1000) || (SV_nHadronic == 2 && HadronicSV_dxySig[0] < 1000 && HadronicSV_dxySig[1] < 1000) || SV_nLeptonic==0 || (SV_nLeptonic == 1 && LeptonicSV_dxySig[0] < 1000) || (SV_nLeptonic == 2 && LeptonicSV_dxySig[0] < 1000 && LeptonicSV_dxySig[1] < 1000))"

noSVhad: &noSVhad
  - "SV_nHadronic==0 || (SV_nHadronic == 1 && HadronicSV_dxySig[0] < 1000) || (SV_nHadronic == 2 && HadronicSV_dxySig[0] < 1000 && HadronicSV_dxySig[1] < 1000)"

noSVlep: &noSVlep
  - "SV_nLeptonic==0 || (SV_nLeptonic == 1 && LeptonicSV_dxySig[0] < 1000) || (SV_nLeptonic == 2 && LeptonicSV_dxySig[0] < 1000 && LeptonicSV_dxySig[1] < 1000)"

################################################################

############################### Photon Strings ##########################
noBHPhotons: &noBHPhotons
  - "(( (nBaseLinePhotons == 1 && baseLinePhoton_beamHaloCNNScore[0] < 0.917252) || (nBaseLinePhotons == 2 && baseLinePhoton_beamHaloCNNScore[0] < 0.917252 && baseLinePhoton_beamHaloCNNScore[1] < 0.917252) ) )"

noNonPromptPhotons: &noNonPromptPhotons
  - "( (nBaseLinePhotons == 1 && (baseLinePhoton_WTimeSig[0] < 2.5 && baseLinePhoton_WTimeSig[0] > -2.5)) || (nBaseLinePhotons == 2 && ( baseLinePhoton_WTimeSig[0] < 2.5 && baseLinePhoton_WTimeSig[0] > -2.5) && ( baseLinePhoton_WTimeSig[1] < 2.5 && baseLinePhoton_WTimeSig[1] > -2.5)) )"

PhoCR_geq1prompt: &PhoCR_geq1prompt
  - " ((nBaseLinePhotons == 1 && baseLinePhoton_isoANNScore[0]< 0.9 && baseLinePhoton_WTimeSig[0]  < 2.5 && baseLinePhoton_WTimeSig[0] > -2.5) ||  (nBaseLinePhotons ==2 && baseLinePhoton_isoANNScore[0]< 0.9 && baseLinePhoton_WTimeSig[0]  < 2.5 && baseLinePhoton_WTimeSig[0] > -2.5 && baseLinePhoton_isoANNScore[1]< 0.9 && baseLinePhoton_WTimeSig[1]  < 2.5 && baseLinePhoton_WTimeSig[1] > -2.5))" 

PhoSR_geq2prompt: &PhoSR_geq2prompt
  - " (  ( nBaseLinePhotons ==2 &&  (baseLinePhoton_isoANNScore[0]> 0.9 && baseLinePhoton_isoANNScore[1]>0.9) && baseLinePhoton_WTimeSig[0]  < 2.5 && baseLinePhoton_WTimeSig[0] > -2.5 && baseLinePhoton_WTimeSig[1]  < 2.5 && baseLinePhoton_WTimeSig[1] > -2.5) )"   

geq1PhoPromptCR: &geq1PhoPromptCR
  - " ( (nBaseLinePhotons == 1 && baseLinePhoton_isoANNScore[0]< 0.9 &&  baseLinePhoton_WTimeSig[0] > 0) ||  (nBaseLinePhotons == 2 && baseLinePhoton_isoANNScore[0]< 0.9  && baseLinePhoton_isoANNScore[1]< 0.9 &&  baseLinePhoton_WTimeSig[0] > 0 &&  baseLinePhoton_WTimeSig[1] > 0))" 

geq1PhoPromptSR: &geq1PhoPromptSR
  - " ( (nBaseLinePhotons == 1 && baseLinePhoton_isoANNScore[0]> 0.95 && baseLinePhoton_WTimeSig[0] > 0) ||  (nBaseLinePhotons == 2 && baseLinePhoton_isoANNScore[0]> 0.95  && baseLinePhoton_isoANNScore[1]> 0.95 && baseLinePhoton_WTimeSig[0] > 0 && baseLinePhoton_WTimeSig[1] > 0))"


PhoCR_eq2prompt: &PhoCR_eq2prompt
  - " (nBaseLinePhotons == 2 && (baseLinePhoton_isoANNScore[0] < 0.95 || baseLinePhoton_isoANNScore[1]< 0.95))" 
PhoSR_eq2prompt: &PhoSR_eq2prompt
  - " (nBaseLinePhotons == 2 && (baseLinePhoton_isoANNScore[0] >= 0.95 || baseLinePhoton_isoANNScore[1] >= 0.95))" 


##########################################################
Cleaning: &Cleaning
  - "(Flag_MetFilters == 1)  && ( (Trigger_PFMET120_PFMHT120_IDTight == 1)||(Trigger_PFMET120_PFMHT120_IDTight_PFHT60 == 1)||(Trigger_PFMETNoMu120_PFMHTNoMu120_IDTight)||(Trigger_PFMETNoMu120_PFMHTNoMu120_IDTight_PFHT60))"
    

kin: &kin
  - "((rjrIsrNPhotons > rjrIsrNISRPhos) && rjrIsr_nSVisObjects > 2 && rjrIsr_PtIsr > 800)"

b00: &b00
  - "(rjrIsr_RIsr >= 0.6) && (rjrIsr_RIsr < 0.7)"
b01: &b01
  - "(rjrIsr_RIsr >= 0.7) && (rjrIsr_RIsr < 0.8)"
b02: &b02
  - "(rjrIsr_RIsr >= 0.8) && (rjrIsr_RIsr < 0.9)"

bins:
  Ch1CReq2PhoMedIsoPrompt00:
    cuts:
      - *baseline_cuts
      - *Cleaning
      - *noBHPhotons
      - *noNonPromptPhotons
      - *PhoCR_eq2prompt
      - *noSV
      - *kin
      - *b00
  Ch1CReq2PhoMedIsoPrompt01:
    cuts:
      - *baseline_cuts
      - *Cleaning
      - *noBHPhotons
      - *noNonPromptPhotons
      - *PhoCR_eq2prompt
      - *noSV
      - *kin
      - *b01
  Ch1CReq2PhoMedIsoPrompt02:
    cuts:
      - *baseline_cuts
      - *Cleaning
      - *noBHPhotons
      - *noNonPromptPhotons
      - *PhoCR_eq2prompt
      - *noSV
      - *kin
      - *b02
  Ch2CReq2PhoTightIsoPrompt00:
    cuts:
      - *baseline_cuts
      - *Cleaning
      - *noBHPhotons
      - *noNonPromptPhotons
      - *PhoSR_eq2prompt
      - *noSV
      - *kin
      - *b00
  Ch2SReq2PhoTightIsoPrompt01:
    cuts:
      - *baseline_cuts
      - *Cleaning
      - *noBHPhotons
      - *noNonPromptPhotons
      - *PhoSR_eq2prompt
      - *noSV
      - *kin
      - *b01
  Ch2SReq2PhoTightIsoPrompt02:
    cuts:
      - *baseline_cuts
      - *Cleaning
      - *noBHPhotons
      - *noNonPromptPhotons
      - *PhoSR_eq2prompt
      - *noSV
      - *kin
      - *b02
