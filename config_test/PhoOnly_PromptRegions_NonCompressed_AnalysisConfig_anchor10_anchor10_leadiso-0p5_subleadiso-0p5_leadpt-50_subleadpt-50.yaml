
analysis:
  name: "PhoOnly_PromptRegions_NonCompressed_AnalysisConfig_anchor10_leadiso-0p5_subleadiso-0p5_leadpt-50_subleadpt-50"
  luminosity: 165.27
  output_json: "PhoOnly_PromptRegions_NonCompressed_AnalysisConfig_anchor10_leadiso-0p5_subleadiso-0p5_leadpt-50_subleadpt-50.json"
    
samples:
  #backgrounds: []#"Wjets", "Zjets", "QCD", "Top", "Gjets", "Box"]
  signals: ["gogoGZ"] 
  data: ["MET16","MET17","MET18","MET23"]

baseline_cuts: &baseline_cuts
  - "(selCMet > 150)" 

Cleaning: &Cleaning
  - "(Flag_MetFilters == 1) && ( rjrPTS[0] < 150) && ( (Trigger_PFMET120_PFMHT120_IDTight == 1)||(Trigger_PFMET120_PFMHT120_IDTight_PFHT60 == 1)||(Trigger_PFMETNoMu120_PFMHTNoMu120_IDTight)||(Trigger_PFMETNoMu120_PFMHTNoMu120_IDTight_PFHT60))"

################################ SV VETO Strings ##################
#exactly 1 hadronic SR SV
noSV: &noSV
  - "SV_nHadronic==0 || (SV_nHadronic == 1 && HadronicSV_dxySig[0] < 1000) || (SV_nHadronic == 2 && HadronicSV_dxySig[0] < 1000 && HadronicSV_dxySig[1] < 1000) || SV_nLeptonic==0 || (SV_nLeptonic == 1 && LeptonicSV_dxySig[0] < 1000) || (SV_nLeptonic == 2 && LeptonicSV_dxySig[0] < 1000 && LeptonicSV_dxySig[1] < 1000)"

################ Delayed photon VETO strings #########################
noBHPhotons: &noBHPhotons
  - "(( (nBaseLinePhotons == 1 && baseLinePhoton_beamHaloCNNScore[0] < 0.917252) || (nBaseLinePhotons == 2 && baseLinePhoton_beamHaloCNNScore[0] < 0.917252 && baseLinePhoton_beamHaloCNNScore[1] < 0.917252) ) )"

noNonPromptPhotons: &noNonPromptPhotons
  - "( (nBaseLinePhotons == 1 && (baseLinePhoton_WTimeSig[0] < 2.5 && baseLinePhoton_WTimeSig[0] > -2.5)) || (nBaseLinePhotons == 2 && ( baseLinePhoton_WTimeSig[0] < 2.5 && baseLinePhoton_WTimeSig[0] > -2.5) && ( baseLinePhoton_WTimeSig[1] < 2.5 && baseLinePhoton_WTimeSig[1] > -2.5)) )"
Ch5CReq1PhoMedIsoPrompt: &Ch5CReq1PhoMedIsoPrompt
  - "(nBaseLinePhotons == 1 && ((baseLinePhoton_Pt[0] > 50 && (baseLinePhoton_Eta[0] < 1.479 && baseLinePhoton_Eta[0] > -1.479 )) && baseLinePhoton_isoANNScore[0] < 0.5 ) || (nBaseLinePhotons == 2 && (baseLinePhoton_Eta[0] < 1.479 && baseLinePhoton_Eta[0] > -1.479 ) && (baseLinePhoton_Eta[1] < 1.479 && baseLinePhoton_Eta[1] > -1.479 ) && ((baseLinePhoton_isoANNScore[0] > 0.5 && baseLinePhoton_isoANNScore[1] < 0.5) || (baseLinePhoton_isoANNScore[0] < 0.5 && baseLinePhoton_isoANNScore[1] > 0.5)) && (baseLinePhoton_Pt[0] > 50 && baseLinePhoton_Pt[1] > 50) ) )"
Ch6SReq1PhoTightIsoPrompt: &Ch6SReq1PhoTightIsoPrompt
  - "(nBaseLinePhotons == 1 && ( baseLinePhoton_Pt[0] > 50 && baseLinePhoton_isoANNScore[0] >= 0.5 && (baseLinePhoton_Eta[0] < 1.479 && baseLinePhoton_Eta[0] > -1.479) ))"
Ch5CReq2PhoMedIsoPrompt: &Ch5CReq2PhoMedIsoPrompt
  - "( (nBaseLinePhotons == 2 && ((baseLinePhoton_Pt[0] > 50 && (baseLinePhoton_Eta[0] < 1.479 && baseLinePhoton_Eta[0] > -1.479 ) && baseLinePhoton_isoANNScore[0] < 0.5)  && (baseLinePhoton_Pt[1] > 50 && (baseLinePhoton_Eta[1] < 1.479 && baseLinePhoton_Eta[1] > -1.479 ) && baseLinePhoton_isoANNScore[1] < 0.5) )))"
Ch6SReq2PhoTightIsoPrompt: &Ch6SReq2PhoTightIsoPrompt
  - "( (nBaseLinePhotons == 2 && ( baseLinePhoton_Pt[0] > 50 && baseLinePhoton_isoANNScore[0] >= 0.5 && (baseLinePhoton_Eta[0] < 1.479 && baseLinePhoton_Eta[0] > -1.479)  ) && (baseLinePhoton_Pt[1] > 50 && baseLinePhoton_isoANNScore[1] >= 0.5 && (baseLinePhoton_Eta[1] < 1.479 && baseLinePhoton_Eta[1] > -1.479 )  )) )"
Ch5CRgeq1PhoMedIsoPrompt: &Ch5CRgeq1PhoMedIsoPrompt
  - "(nBaseLinePhotons == 1 && ((baseLinePhoton_Pt[0] > 50 && (baseLinePhoton_Eta[0] < 1.479 && baseLinePhoton_Eta[0] > -1.479 )) && baseLinePhoton_isoANNScore[0] < 0.5 ) || (nBaseLinePhotons == 2 && (baseLinePhoton_Eta[0] < 1.479 && baseLinePhoton_Eta[0] > -1.479 ) && (baseLinePhoton_Eta[1] < 1.479 && baseLinePhoton_Eta[1] > -1.479 ) && !(baseLinePhoton_isoANNScore[0] > 0.5 && baseLinePhoton_isoANNScore[1] > 0.5) && baseLinePhoton_Pt[0] > 50 && baseLinePhoton_Pt[1] > 50) )"
Ch6SRgeq1PhoTightIsoPrompt: &Ch6SRgeq1PhoTightIsoPrompt
  - "( (nBaseLinePhotons == 1 && ( baseLinePhoton_Pt[0] > 50 && baseLinePhoton_isoANNScore[0] > 0.5 &&  (baseLinePhoton_Eta[0] < 1.479 && baseLinePhoton_Eta[0] > -1.479) ))  || ( (nBaseLinePhotons == 2 && ( baseLinePhoton_isoANNScore[0] > 0.5 && baseLinePhoton_Pt[0] > 50 && (baseLinePhoton_Eta[0] < 1.479 && baseLinePhoton_Eta[0] > -1.479)  ) && (baseLinePhoton_Pt[1] > 50 && baseLinePhoton_isoANNScore[1] > 0.5 && (baseLinePhoton_Eta[1] < 1.479 && baseLinePhoton_Eta[1] > -1.479 )  ))  ) )"


kin: &kin
  - "(rjr_Ms[0] >= 1000) && (rjr_Rs[0] >= 0.15)"

b00: &b00
  - "(rjr_Ms[0] >= 2500) && (rjr_Ms[0] < 2700) && (rjr_Rs[0] < 0.3)"
b10: &b10
  - "(rjr_Ms[0] >= 2700) && (rjr_Rs[0] < 0.3)"
b01: &b01
  - "(rjr_Ms[0] >= 2500) && (rjr_Ms[0] < 2700) && (rjr_Rs[0] >= 0.3)"
b11: &b11
  - "(rjr_Ms[0] >= 2700) && (rjr_Rs[0] >= 0.3)"
#add another bin that's higher in Ms-Rs for higher mass signals
b22: &b22
 - "(rjr_Ms[0] >= 3500) && (rjr_Rs[0] >= 0.4)"


