#test fit config
fitname: "1PhoDelayed"
asimov: True
datadriven: True

#main fit
#naming convention: Ch#IDBin where Bin = xy coord in MsRs plane
shape_transfer_fit:
  bin_association:
    Ch1CR1PhoBHEarly:
      - "Ch1CR1PhoBHEarly00"
      - "Ch1CR1PhoBHEarly10"
    Ch2CR1PhoBHLate:
      - "Ch2CR1PhoBHLate00"
      - "Ch2CR1PhoBHLate10"
    Ch3CR1PhonotBHEarly:
      - "Ch3CR1PhonotBHEarly00"
      - "Ch3CR1PhonotBHEarly10"
    Ch4SR1PhonotBHLate:
      - "Ch4SR1PhonotBHLate00"
      - "Ch4SR1PhonotBHLate10"
  #channel_association:
  #  Ch1Pho1CR:
  #    - "Ch2Pho2CR"

#main fit
#ABCD - SR bin (A) maps to [B, C, D]
#grid convention
#not bh    D | A
#        ---------
#bh        C | B
#      early -> late
# such that A*D = C*B -> A = C*B/D
ABCD_fit:
  bin_association:
    Ch1CR1PhoBHEarly:
      - "Ch1CR1PhoBHEarly00"
      - "Ch1CR1PhoBHEarly10"
    Ch2CR1PhoBHLate:
      - "Ch2CR1PhoBHLate00"
      - "Ch2CR1PhoBHLate10"
    Ch3CR1PhonotBHEarly:
      - "Ch3CR1PhonotBHEarly00"
      - "Ch3CR1PhonotBHEarly10"
    Ch4SR1PhonotBHLate:
      - "Ch4SR1PhonotBHLate00"
      - "Ch4SR1PhonotBHLate10"
  channel_association:
    Ch4SR1PhonotBHLate:
      - "Ch2CR1PhoBHLate"
      - "Ch1CR1PhoBHEarly"
      - "Ch3CR1PhonotBHEarly"

  #bin_association:
  #  Ch1Pho1CR11: #SR bin or bin to predict yield
  #    - "Ch1Pho1CR00"
  #    - "Ch1Pho1CR10"
  #    - "Ch1Pho1CR01"

  #can add channel associations for stacked ABCD fits
#extra systematics
systematics:
  #pin CR channels
  sys1:
      type: "lnN"
      name: "lnN_Ch1CR1PhoBHEarly"
      init_val: 1.01 
      bins:
          - "Ch1CR1PhoBHEarly00"
          - "Ch1CR1PhoBHEarly10"
  sys2:
      type: "lnN"
      name: "lnN_Ch2CR1PhoBHLate"
      init_val: 1.3
      bins:
          - "Ch2CR1PhoBHLate00"
          - "Ch2CR1PhoBHLate10"
  sys3:
      type: "lnN"
      name: "lnN_Ch3CR1PhonotBHEarly"
      init_val: 1.01 
      bins:
          - "Ch3CR1PhonotBHEarly00"
          - "Ch3CR1PhonotBHEarly10"
  sys4:
      type: "lnN"
      name: "lnN_Ch4SR1PhonotBHLate"
      init_val: 1.4 
      bins:
          - "Ch4SR1PhonotBHLate00"
          - "Ch4SR1PhonotBHLate10"
