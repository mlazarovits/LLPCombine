#test fit config
fitname: "PhoOnly_PromptRegions_NonCompressed_FullRegions"
asimov: True
datadriven: True

#main fit
#naming convention: Ch#[CR/SR]IDBin where Bin = xy coord in MsRs plane
shape_transfer_fit:
  bin_association:
    Ch5CRgeq1PhoMedIsoPromptBin:
      - "Ch5CRgeq1PhoMedIsoPromptBin00"
      - "Ch5CRgeq1PhoMedIsoPromptBin01"
      - "Ch5CRgeq1PhoMedIsoPromptBin10"
      - "Ch5CRgeq1PhoMedIsoPromptBin11"
      - "Ch5CRgeq1PhoMedIsoPromptBin22"
    Ch6SReq1PhoTightIsoPromptBin:
      - "Ch6SReq1PhoTightIsoPromptBin00"
      - "Ch6SReq1PhoTightIsoPromptBin01"
      - "Ch6CReq1PhoTightIsoPromptBin10"
      - "Ch6SReq1PhoTightIsoPromptBin11"
      - "Ch6SReq1PhoTightIsoPromptBin22"
    Ch6SReq2PhoTightIsoPromptBin:
      - "Ch6SReq2PhoTightIsoPromptBin00"
      - "Ch6SReq2PhoTightIsoPromptBin01"
      - "Ch6CReq2PhoTightIsoPromptBin10"
