    Ch5CRgeq1PhoMedIsoPromptBin:
      - "Ch6SReq2PhoTightIsoPromptBin"
      - "Ch6SReq1PhoTightIsoPromptBin"
#main fit
#ABCD - SR bin (A) maps to [B, C, D]
#grid convention
#not bh    D | A
#        ---------
#bh        C | B
#      early -> late
# such that A*D = C*B -> A = C*B/D
ABCD_fit:

